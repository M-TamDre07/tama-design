<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Tama Andrea Studio</title>
  <meta name="description" content="Koneksi internet terputus. Beberapa halaman yang pernah dikunjungi masih tersedia." />
  <style>
    :root {
      --brand: #00E0B8;
      --bg: #08090d;
      --surface: #1a1e2a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f2f7;
      --text2: #9aa3bb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 420px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1.25rem; }
    h1 {
      font-size: 1.5rem; font-weight: 700;
      margin-bottom: 0.75rem; color: var(--text);
    }
    p { color: var(--text2); font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.75rem; }
    button {
      background: var(--brand); color: #001018;
      font-weight: 700; font-size: 0.95rem;
      border: none; padding: 0.75rem 1.75rem;
      border-radius: 12px; cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    button:hover { background: #00b896; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    .brand-footer {
      margin-top: 2rem; padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem; color: var(--text2);
    }
    .brand-footer strong { color: var(--brand); }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="icon">📡</div>
    <h1>Kamu Sedang Offline</h1>
    <p>Koneksi internet terputus. Beberapa halaman yang pernah kamu kunjungi masih bisa diakses. Coba lagi setelah koneksi kembali!</p>
    <button onclick="location.reload()">🔄 Coba Lagi</button>
    <div class="brand-footer">
      <strong>Tama Andrea Studio</strong><br>
      Jasa Desain Grafis Profesional
    </div>
  </div>
</body>
</html>
